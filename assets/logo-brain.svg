<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Alternative logo: a brain containing an e-graph with multiple e-classes.
       Colors live here, same convention as logo.svg: edit the values below;
       the dark block applies when the viewer uses a dark color scheme. -->
  <style>
    .brain { fill: none; stroke: #000000; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .fold { fill: none; stroke: #000000; stroke-width: 2; stroke-linecap: round; }
    .edge { stroke: #8a919c; stroke-width: 1.5; }
    .eclass { fill: none; stroke: #d97706; stroke-width: 2; stroke-dasharray: 4 3; stroke-linecap: round; }
    .eclass-small { fill: none; stroke: #d97706; stroke-width: 2; stroke-dasharray: 3 2.5; stroke-linecap: round; }
    .enode { fill: #d97706; }
    @media (prefers-color-scheme: dark) {
      .brain, .fold { stroke: #e8eaed; }
      .edge { stroke: #9aa3af; }
      .eclass, .eclass-small { stroke: #e8b45a; }
      .enode { fill: #e8b45a; }
    }
  </style>
  <path class="brain" d="M14 34 C8 32 6 25 11 21 C9 13 16 8 22 11 C26 4 36 4 40 9 C47 5 55 9 55 16 C61 20 61 28 56 31 C58 36 53 41 48 40 C48 44 44 47 40 45 L39 49 L34 48 L35 44 C28 43 20 39 14 34 Z"/>
  <path class="fold" d="M32.5 7.5 C32.8 10.5 35 12 37.8 11.6"/>
  <path class="fold" d="M13 27 C15.5 26.5 16.5 24 15.5 21.8"/>
  <path class="fold" d="M56.5 22 C54 23 53 25.5 54 28"/>
  <path class="fold" d="M42 45 L44.5 42"/>
  <path class="fold" d="M45 45.4 L47.3 42.6"/>
  <line class="edge" x1="25" y1="21.5" x2="33" y2="35"/>
  <line class="edge" x1="46.5" y1="23.5" x2="33" y2="35"/>
  <rect class="eclass" x="14.5" y="17" width="15.5" height="9" rx="4.5"/>
  <rect class="eclass" x="42" y="13" width="9" height="15" rx="4.5"/>
  <circle class="eclass-small" cx="33" cy="35" r="5"/>
  <circle class="enode" cx="19.5" cy="21.5" r="2.4"/>
  <circle class="enode" cx="25" cy="21.5" r="2.4"/>
  <circle class="enode" cx="46.5" cy="17.5" r="2.4"/>
  <circle class="enode" cx="46.5" cy="23.5" r="2.4"/>
  <circle class="enode" cx="33" cy="35" r="2.4"/>
</svg>
